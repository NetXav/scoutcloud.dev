name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'src/app/**'
      - '.github/workflows/build-push-image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: scoutcloud-app
  ECS_CLUSTER: scoutcloud
  ECS_SERVICE: scoutcloud-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        id: aws-auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Skip if AWS not yet configured
        if: steps.aws-auth.outcome != 'success'
        run: |
          echo "AWS_OIDC_ROLE_ARN not set - skipping (configured in Chapter 6+)"
          exit 0

      - name: Login to Amazon ECR
        id: ecr-login
        if: steps.aws-auth.outcome == 'success'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        if: steps.aws-auth.outcome == 'success'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG src/app/
          docker tag  $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Force new ECS deployment
        if: steps.aws-auth.outcome == 'success'
        run: |
          set +e
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE
          if [ $? -ne 0 ]; then
            echo "ECS service not yet deployed - skipping force-deploy"
            exit 0
          fi
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment
